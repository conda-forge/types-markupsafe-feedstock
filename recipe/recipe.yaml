# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.10"

package:
  name: types-markupsafe
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/types-markupsafe/types-MarkupSafe-${{ version }}.tar.gz
  sha256: 85b3a872683d02aea3a5ac2a8ef590193c344092032f58457287fbf8e06711b1

build:
  number: 2
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - package_contents:
      site_packages:
        - markupsafe-stubs/__init__.pyi
  - python:
      imports: []
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/python/typeshed
  repository: https://github.com/python/typeshed
  summary: Typing stubs for MarkupSafe
  license: Apache-2.0 AND MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fhoehle
    - conda-forge/mypy
